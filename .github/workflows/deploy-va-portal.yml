name: Deploy VA Student Portal

on:
  push:
    branches: [main]
    paths:
      - 'VA/student_portal/**'
      - '.github/workflows/deploy-va-portal.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./VA/student_portal
          publish_branch: gh-pages
          force_orphan: true
